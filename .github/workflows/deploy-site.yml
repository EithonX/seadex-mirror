name: Deploy site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-site.yml"
      - ".github/workflows/rebuild-mirror.yml"
      - "frontend/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'seadex' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Verify Cloudflare Pages access
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            --header "Content-Type: application/json" \
            > /tmp/cloudflare-pages-project.json
          node -e "const fs=require('fs'); const payload=JSON.parse(fs.readFileSync('/tmp/cloudflare-pages-project.json','utf8')); if (!payload.success) { console.error(JSON.stringify(payload.errors ?? payload, null, 2)); process.exit(1); } console.log('Verified Cloudflare Pages project access.');"

      - name: Deploy Pages site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}

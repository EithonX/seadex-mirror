name: Rebuild mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      ANILIST_ACCESS_TOKEN: ${{ secrets.ANILIST_ACCESS_TOKEN }}
      ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
      ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'seadex' }}
      MIRROR_STATUS_URL: ${{ format('https://{0}.pages.dev/mirror-data/status.json', vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'seadex') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static mirror data
        run: npm run data:build

      - name: Build frontend
        run: npm run build

      - name: Deploy Pages site
        run: npx wrangler pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME"

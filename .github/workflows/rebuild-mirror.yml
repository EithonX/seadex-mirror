name: Rebuild mirror

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME || 'seadex_mirror' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Rebuild remote D1 snapshot
        run: node scripts/rebuild-d1.mjs --apply --db "$D1_DATABASE_NAME"

      - name: Deploy Worker
        run: npm run deploy
